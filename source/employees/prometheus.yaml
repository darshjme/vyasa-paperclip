schema_version: 1
id: prometheus
display_name: Prometheus
registry_source: vyasa
role_key: coder
system_prompt_ref: "vyasa:coder"
allowed_tools:
  - bash
  - file_read
  - file_write
  - file_edit
  - grep
  - glob
  - git
allowed_plugins:
  - memory
  - context_engine
memory_namespace: prometheus
model_preference:
  default: openrouter/anthropic/haiku-4-5
  provider: openrouter
  fallback:
    model: openrouter/anthropic/sonnet-4-6
    provider: openrouter
temperature: 0.4
max_turns: 25
messaging_aliases:
  - "@prometheus"
  - "@coder"
  - "/ask prometheus"
visibility: internal
tags:
  - tier1
  - execution
