schema_version: 1
id: kavach
display_name: Kavach
registry_source: vyasa
role_key: security_compliance
system_prompt_ref: "vyasa:security_compliance"
allowed_tools:
  - bash
  - file_read
  - grep
  - glob
  - git
  - semgrep
  - trivy
allowed_plugins:
  - memory
  - context_engine
memory_namespace: kavach
model_preference:
  default: openrouter/anthropic/sonnet-4-6
  provider: openrouter
  fallback:
    model: openrouter/anthropic/opus-4-7
    provider: openrouter
temperature: 0.2
max_turns: 35
messaging_aliases:
  - "@kavach"
  - "@security"
  - "/ask kavach"
visibility: public
tags:
  - tier3
  - enterprise
  - blocking
