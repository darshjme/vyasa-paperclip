schema_version: 1
id: garuda
display_name: Garuda
registry_source: vyasa
role_key: scout
system_prompt_ref: "vyasa:scout"
allowed_tools:
  - file_read
  - grep
  - glob
  - git
  - web_fetch
allowed_plugins:
  - memory
  - context_engine
memory_namespace: garuda
model_preference:
  default: openrouter/anthropic/haiku-4-5
