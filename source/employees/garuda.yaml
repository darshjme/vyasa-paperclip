  fallback:
    model: openrouter/anthropic/sonnet-4-6
    provider: openrouter
temperature: 0.3
max_turns: 25
messaging_aliases:
  - "@garuda"
  - "@scout"
  - "/ask garuda"
visibility: internal
tags:
  - tier2
  - architecture
