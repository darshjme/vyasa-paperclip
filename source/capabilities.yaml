  bash:             { decision: deny,             rationale: "orchestrator never shells directly" }
  git:              { decision: deny,             rationale: "orchestrator never commits" }
  docker:           { decision: deny,             rationale: "containers owned by Vayu / Iyer / Rao" }
  web_fetch:        { decision: allow,            rationale: "product intel + recon dispatch" }
  web_search:       { decision: allow,            rationale: "planning needs live search" }
  gateway_telegram: { decision: allow,            rationale: "primary Managing-Partner inbox" }
  gateway_whatsapp: { decision: allow,            rationale: "primary Managing-Partner inbox" }
  gateway_slack:    { decision: allow,            rationale: "primary Managing-Partner inbox" }
  delegate:         { decision: allow,            rationale: "core orchestration primitive" }
  spawn_subagent:   { decision: allow,            rationale: "parallel STEP-3 dispatch" }
  code_exec:        { decision: deny,             rationale: "no eval in orchestrator context" }
  vision:           { decision: allow,            rationale: "screenshot + design review" }
  stt:              { decision: allow,            rationale: "voice note intake" }
  tts:              { decision: allow,            rationale: "voice replies to the user" }
