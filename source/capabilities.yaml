# Vyasa Agent — Capability Matrix (28 employees x 20 capabilities)
#
# Source of truth for Kavach's per-employee tool-scope sandbox (design-04 §1).
# Each cell: decision in {allow, deny, require_approval}, rationale <= 80 chars.
#
# Edit via PR only; changes trigger the SECURITY-APPROVED gate (design-04 §10).

# --- 18 Vyasa mythic specialists ------------------------------------------

vyasa:
